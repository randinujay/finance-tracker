<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hexo Creative · Professional Billing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <style>
        :root {
            --bg: #f4f6fb;
            --surface: #ffffff;
            --surface-2: #f8fafc;
            --border: #e2e8f0;
            --text: #0f172a;
            --text-mid: #475569;
            --text-muted: #94a3b8;
            --sidebar-bg: rgba(255,255,255,0.97);
            --hover-bg: #f1f5f9;
            --purple: #6D28D9;
            --purple-soft: #EDE9FE;
            --purple-mid: #8B5CF6;
            --purple-text: #6D28D9;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.07);
            --shadow-lg: 0 20px 40px rgba(0,0,0,0.10);
            --radius: 14px;
            --radius-sm: 10px;
            --transition: 0.18s ease;
        }
        html[data-theme="dark"] {
            --bg: #0d1117;
            --surface: #161b22;
            --surface-2: #1c232d;
            --border: #30363d;
            --text: #e6edf3;
            --text-mid: #8b949e;
            --text-muted: #484f58;
            --sidebar-bg: rgba(13,17,23,0.98);
            --hover-bg: #21262d;
            --purple: #9b6bff;
            --purple-soft: rgba(139,92,246,0.18);
            --purple-mid: #8B5CF6;
            --purple-text: #a78bfa;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
            --shadow-lg: 0 20px 40px rgba(0,0,0,0.5);
        }

        * { font-family: 'DM Sans', sans-serif; box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            transition: background var(--transition), color var(--transition);
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        h1,h2,h3,h4 { letter-spacing: -0.02em; }

        body.sidebar-open {
            overflow: hidden;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            transition: box-shadow var(--transition), transform var(--transition);
        }
        .card:hover { box-shadow: var(--shadow-md); }
        .card-lift:hover { transform: translateY(-2px); }

        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: 16rem;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            backdrop-filter: blur(10px);
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 60;
            pointer-events: auto;
            box-shadow: none;
            display: flex;
            flex-direction: column;
        }
        
        .sidebar.open {
            transform: translateX(0);
            box-shadow: 4px 0 24px rgba(0, 0, 0, 0.15);
        }

        @media (min-width: 1024px) {
            .sidebar {
                transform: translateX(0) !important;
                box-shadow: none;
            }
        }

        .sidebar-link {
            display: flex; align-items: center; gap: 10px;
            margin: 2px 10px; padding: 12px 14px;
            border-radius: var(--radius-sm);
            color: var(--text-mid);
            font-weight: 500; font-size: 0.875rem;
            transition: all var(--transition);
            position: relative;
            cursor: pointer; text-decoration: none;
            min-height: 44px;
        }
        .sidebar-link:hover { background: var(--hover-bg); color: var(--purple-text); }
        .sidebar-link.active {
            background: var(--purple-soft);
            color: var(--purple-text);
            font-weight: 600;
        }
        .sidebar-link.active::before {
            content: '';
            position: absolute; left: 0; top: 20%; bottom: 20%;
            width: 3px; border-radius: 0 3px 3px 0;
            background: var(--purple);
            margin-left: -10px;
        }

        .sidebar-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 55;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            pointer-events: none;
        }

        .sidebar-overlay.active {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        @media (min-width: 1024px) {
            .sidebar-overlay {
                display: none !important;
            }
        }

        #hamburger {
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 70;
            padding: 10px;
            border-radius: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-md);
            cursor: pointer;
            min-width: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (min-width: 1024px) {
            #hamburger {
                display: none !important;
            }
        }

        /* Sidebar logo styling */
        #sidebar-logo-img {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }
        
        /* Purple filter for light mode */
        .logo-purple-filter {
            filter: brightness(0) saturate(100%) invert(25%) sepia(98%) saturate(3045%) hue-rotate(254deg) brightness(92%) contrast(97%);
        }
        
        /* White filter for dark mode */
        .logo-white-filter {
            filter: brightness(0) saturate(100%) invert(100%) sepia(0%) saturate(0%) hue-rotate(0deg) brightness(100%) contrast(100%);
        }

        .input-field {
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 0.7rem 0.9rem;
            width: 100%;
            background: var(--surface);
            color: var(--text);
            font-size: 0.9rem;
            font-family: 'DM Sans', sans-serif;
            transition: border-color var(--transition), box-shadow var(--transition);
            min-height: 44px;
        }
        .input-field:focus {
            outline: none;
            border-color: var(--purple-mid);
            box-shadow: 0 0 0 3px rgba(139,92,246,0.12);
        }

        .btn-primary {
            background: linear-gradient(135deg, #8B5CF6, #6D28D9);
            color: white; border: none;
            padding: 0.7rem 1.4rem; border-radius: var(--radius-sm);
            font-weight: 600; font-size: 0.875rem;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(109,40,217,0.25);
            min-height: 44px;
        }
        .btn-primary:hover { opacity: 0.9; }
        .btn-secondary {
            background: var(--surface); color: var(--text-mid);
            border: 1px solid var(--border);
            padding: 0.7rem 1.4rem; border-radius: var(--radius-sm);
            font-weight: 500; font-size: 0.875rem;
            cursor: pointer;
            min-height: 44px;
        }
        .btn-secondary:hover { background: var(--hover-bg); }
        .action-btn {
            padding: 10px; border-radius: 8px; color: var(--text-muted);
            background: transparent; border: none; cursor: pointer;
            min-width: 44px; min-height: 44px;
            display: inline-flex; align-items: center; justify-content: center;
        }
        .action-btn:hover { background: var(--surface); color: var(--purple-text); }

        .badge { padding: 3px 10px; border-radius: 99px; font-size: 0.72rem; font-weight: 600; display: inline-block; border: 1px solid transparent; }
        .badge-paid    { background: #d1fae5; color: #065f46; border-color: #a7f3d0; }
        .badge-sent    { background: #dbeafe; color: #1e40af; border-color: #bfdbfe; }
        .badge-draft   { background: var(--hover-bg); color: var(--text-mid); border-color: var(--border); }
        .badge-overdue { background: #fee2e2; color: #991b1b; border-color: #fecaca; }
        .badge-accepted{ background: #d1fae5; color: #065f46; border-color: #a7f3d0; }
        .badge-rejected{ background: #fee2e2; color: #991b1b; border-color: #fecaca; }
        html[data-theme="dark"] .badge-paid     { background: rgba(6,95,70,0.3);   color: #6ee7b7; border-color: rgba(110,231,183,0.3); }
        html[data-theme="dark"] .badge-sent     { background: rgba(30,64,175,0.3); color: #93c5fd; border-color: rgba(147,197,253,0.3); }
        html[data-theme="dark"] .badge-draft    { background: var(--hover-bg); }
        html[data-theme="dark"] .badge-overdue  { background: rgba(153,27,27,0.3); color: #fca5a5; border-color: rgba(252,165,165,0.3); }
        html[data-theme="dark"] .badge-accepted { background: rgba(6,95,70,0.3);   color: #6ee7b7; border-color: rgba(110,231,183,0.3); }
        html[data-theme="dark"] .badge-rejected { background: rgba(153,27,27,0.3); color: #fca5a5; border-color: rgba(252,165,165,0.3); }

        table { border-collapse: separate; border-spacing: 0; width: 100%; }
        thead th { font-weight: 600; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); padding: 14px 18px; text-align: left; }
        tbody td { padding: 14px 18px; border-top: 1px solid var(--border); color: var(--text); font-size: 0.875rem; }
        tbody tr:hover { background: var(--surface-2); }

        @media (max-width: 768px) {
            .table-responsive {
                display: block;
                width: 100%;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
            tbody td { padding: 12px 10px; font-size: 0.8rem; }
            thead th { padding: 12px 10px; font-size: 0.7rem; }
        }

        .preview-pane {
            position: sticky; top: 1.5rem;
            max-height: calc(100vh - 3rem);
            overflow-y: auto;
            background: var(--surface);
            border-radius: 18px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
        }

        @media (max-width: 1024px) {
            .preview-pane {
                position: relative;
                top: 0;
                max-height: none;
            }
        }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

        .stat-card { padding: 22px 24px; }
        .stat-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 14px; }

        .empty-state { border: 2px dashed var(--border); border-radius: 20px; background: var(--surface-2); }

        .profit-ratio-btn { 
            padding: 8px 16px; border-radius: 8px; font-size: 0.8rem; font-weight: 600; 
            cursor: pointer; border: 1.5px solid var(--border); 
            background: var(--surface); color: var(--text-mid); 
            transition: all var(--transition); min-height: 44px;
        }
        .profit-ratio-btn.selected { 
            border-color: var(--purple-mid); 
            background: var(--purple-soft); 
            color: var(--purple-text); 
        }

        .theme-toggle { width: 42px; height: 24px; background: var(--border); border-radius: 99px; position: relative; cursor: pointer; border: none; }
        .theme-toggle.on { background: var(--purple-mid); }
        .theme-toggle::after { content: ''; position: absolute; top: 3px; left: 3px; width: 18px; height: 18px; background: white; border-radius: 99px; transition: transform 0.3s ease; }
        .theme-toggle.on::after { transform: translateX(18px); }

        .toast { display: flex; align-items: center; gap: 10px; padding: 12px 18px; border-radius: 12px; color: white; font-size: 0.875rem; font-weight: 500; box-shadow: 0 8px 24px rgba(0,0,0,0.2); animation: slideIn 0.25s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        .mono { font-family: 'DM Mono', monospace; }

        @media print { 
            body { background: white; } 
            .sidebar, #toast-area, .no-print, #hamburger, #sidebar-overlay { display: none !important; } 
        }

        @media (max-width: 640px) {
            .stat-card { padding: 16px 18px; }
        }
    </style>
</head>
<body>
    <div id="toast-area" class="fixed top-5 right-5 z-[100] flex flex-col gap-2" style="pointer-events:none; max-width: 90vw;"></div>

    <div id="auth-modal" class="fixed inset-0 z-50 hidden items-center justify-center p-4" style="background:rgba(0,0,0,0.4);backdrop-filter:blur(6px);display:none">
        <div class="card p-6 sm:p-8 w-full max-w-md mx-auto">
            <div class="flex items-center gap-3 mb-7">
                <div class="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0" style="background:linear-gradient(135deg,#8B5CF6,#6D28D9)">
                    <i data-lucide="zap" class="w-5 h-5" style="color:white"></i>
                </div>
                <div>
                    <h2 class="text-xl font-bold" style="color:var(--text)">Hexo Creative</h2>
                    <p class="text-xs" style="color:var(--text-muted)">Professional Billing Platform</p>
                </div>
            </div>
            <div id="signin-form" class="space-y-4">
                <p class="text-sm mb-5" style="color:var(--text-mid)">Sign in to your creative workspace</p>
                <div>
                    <label class="text-xs font-semibold uppercase tracking-wider block mb-1" style="color:var(--text-muted)">Email</label>
                    <input type="email" id="auth-email" placeholder="you@example.com" class="input-field" inputmode="email" autocomplete="email">
                </div>
                <div>
                    <label class="text-xs font-semibold uppercase tracking-wider block mb-1" style="color:var(--text-muted)">Password</label>
                    <input type="password" id="auth-password" placeholder="••••••••" class="input-field" autocomplete="current-password">
                    <button id="forgot-pw-btn" class="text-xs mt-1 hover:underline" style="color:var(--purple-text);background:none;border:none;cursor:pointer;padding:8px 0;">Forgot password?</button>
                </div>
                <button id="signin-btn" class="btn-primary w-full py-3 rounded-xl">Sign In</button>
                <button id="signup-btn" class="btn-secondary w-full py-3 rounded-xl">Create Account</button>
                <div id="auth-error" class="hidden text-xs p-3 rounded-lg" style="background:#fee2e2;color:#991b1b"></div>
            </div>
            <div id="auth-loading" class="hidden text-center py-10">
                <div class="w-10 h-10 border-4 rounded-full mx-auto mb-3 animate-spin" style="border-color:var(--purple-mid);border-top-color:transparent"></div>
                <p class="text-sm" style="color:var(--text-muted)">Authenticating…</p>
            </div>
            <div id="user-info" class="hidden">
                <div class="flex items-center gap-3 p-4 rounded-xl mb-4" style="background:var(--purple-soft)">
                    <div class="w-10 h-10 rounded-full flex items-center justify-center font-bold text-white flex-shrink-0" id="user-avatar" style="background:linear-gradient(135deg,#8B5CF6,#6D28D9)">H</div>
                    <div class="min-w-0">
                        <div id="user-email" class="font-semibold truncate" style="color:var(--text)"></div>
                        <div class="text-xs" style="color:var(--text-muted)">Signed in to Hexo</div>
                    </div>
                </div>
                <button id="signout-btn" class="btn-secondary w-full py-3 rounded-xl" style="border-color:#fecaca;color:#dc2626">Sign Out</button>
            </div>
        </div>
    </div>

    <div id="app" class="hidden">
        <div class="sidebar-overlay" id="sidebar-overlay" aria-hidden="true" role="presentation"></div>

        <button id="hamburger" class="lg:hidden" aria-label="Toggle menu" aria-expanded="false" aria-controls="sidebar">
            <i data-lucide="menu" class="w-5 h-5" style="color:var(--text-mid)"></i>
        </button>

        <div class="flex min-h-screen">
            <aside class="sidebar w-64" id="sidebar" aria-hidden="true">
                <div class="p-5 border-b" style="border-color:var(--border)">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <!-- Sidebar logo using favicon.png with color filters -->
                            <img id="sidebar-logo-img" src="favicon.png" alt="Hexo" class="logo-purple-filter">
                            <div class="min-w-0">
                                <div class="font-bold text-sm truncate" style="color:var(--text)">Hexo Creative</div>
                                <div class="text-xs flex items-center gap-1" style="color:var(--text-muted)">
                                    <i data-lucide="cloud" class="w-3 h-3 flex-shrink-0"></i> Live Sync
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <nav class="flex-1 py-3 overflow-y-auto" id="sidebar-nav" style="-webkit-overflow-scrolling: touch;">
                    <div class="px-3 mb-1">
                        <p class="text-xs font-semibold uppercase tracking-wider px-3 mb-2" style="color:var(--text-muted)">Main</p>
                    </div>
                    <a href="#" data-route="dashboard" class="sidebar-link"><i data-lucide="layout-grid" class="w-4 h-4 shrink-0"></i> Dashboard</a>
                    <a href="#" data-route="quotes" class="sidebar-link"><i data-lucide="file-text" class="w-4 h-4 shrink-0"></i> Quotations</a>
                    <a href="#" data-route="invoices" class="sidebar-link"><i data-lucide="receipt" class="w-4 h-4 shrink-0"></i> Invoices</a>
                    <a href="#" data-route="clients" class="sidebar-link"><i data-lucide="users" class="w-4 h-4 shrink-0"></i> Clients</a>
                    <a href="#" data-route="packages" class="sidebar-link"><i data-lucide="package" class="w-4 h-4 shrink-0"></i> Packages</a>
                    <div class="px-3 mt-3 mb-1">
                        <p class="text-xs font-semibold uppercase tracking-wider px-3 mb-2 mt-2" style="color:var(--text-muted)">Finance</p>
                    </div>
                    <a href="#" data-route="profit" class="sidebar-link"><i data-lucide="trending-up" class="w-4 h-4 shrink-0"></i> Profit Tracking</a>
                    <a href="#" data-route="activity" class="sidebar-link"><i data-lucide="activity" class="w-4 h-4 shrink-0"></i> Activity Log</a>
                    <div class="border-t my-3 mx-4" style="border-color:var(--border)"></div>
                    <a href="#" data-route="settings" class="sidebar-link"><i data-lucide="settings" class="w-4 h-4 shrink-0"></i> Settings</a>
                </nav>

                <div class="p-4 border-t" style="border-color:var(--border)">
                    <div class="flex items-center justify-between mb-3">
                        <button id="show-auth" class="flex items-center gap-2 text-xs" style="color:var(--text-muted);background:none;border:none;cursor:pointer;padding:8px;">
                            <i data-lucide="user" class="w-3 h-3 flex-shrink-0"></i>
                            <span id="user-email-mini" class="truncate">Account</span>
                        </button>
                        <button class="theme-toggle" id="theme-toggle" title="Toggle dark mode"></button>
                    </div>
                </div>
            </aside>

            <main class="flex-1 ml-0 lg:ml-64 p-4 sm:p-6 lg:p-8 pt-20 lg:pt-8" id="main-content" style="min-width:0"></main>
        </div>
    </div>

    <script>
    (function () {
        "use strict";

        const firebaseConfig = {
            apiKey: "AIzaSyDAaerlvUaOKrVD3gAOWebnzyGDmCGmvXQ",
            authDomain: "hexo-creative.firebaseapp.com",
            projectId: "hexo-creative",
            storageBucket: "hexo-creative.firebasestorage.app",
            messagingSenderId: "263255331518",
            appId: "1:263255331518:web:cb3e6fa2c2a2cfeb23c4ef"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const storage = firebase.storage();

        db.enablePersistence().catch(() => {});

        // ══════════════════════════════════════════════════════
        // SIDEBAR
        // ══════════════════════════════════════════════════════
        const MobileSidebar = {
            init() {
                const sidebar = document.getElementById('sidebar');
                const overlay = document.getElementById('sidebar-overlay');
                const hamburger = document.getElementById('hamburger');
                
                if (!sidebar || !overlay || !hamburger) return;
                
                hamburger.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    if (sidebar.classList.contains('open')) {
                        this.close(sidebar, overlay, hamburger);
                    } else {
                        this.open(sidebar, overlay, hamburger);
                    }
                });
                
                overlay.addEventListener('click', () => this.close(sidebar, overlay, hamburger));
                
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape' && sidebar.classList.contains('open')) {
                        this.close(sidebar, overlay, hamburger);
                    }
                });
                
                window.addEventListener('resize', () => {
                    if (window.innerWidth >= 1024) {
                        this.close(sidebar, overlay, hamburger);
                    }
                });
            },
            
            open(sidebar, overlay, hamburger) {
                sidebar.classList.add('open');
                overlay.classList.add('active');
                document.body.classList.add('sidebar-open');
                sidebar.setAttribute('aria-hidden', 'false');
                overlay.setAttribute('aria-hidden', 'false');
                hamburger.setAttribute('aria-expanded', 'true');
                const icon = hamburger.querySelector('i');
                if (icon) icon.setAttribute('data-lucide', 'x');
                lucide.createIcons();
            },
            
            close(sidebar, overlay, hamburger) {
                sidebar.classList.remove('open');
                overlay.classList.remove('active');
                document.body.classList.remove('sidebar-open');
                sidebar.setAttribute('aria-hidden', 'true');
                overlay.setAttribute('aria-hidden', 'true');
                hamburger.setAttribute('aria-expanded', 'false');
                const icon = hamburger.querySelector('i');
                if (icon) icon.setAttribute('data-lucide', 'menu');
                lucide.createIcons();
            }

        const State = {

            invoices: [],
            clients: [],
            packages: [],
            settings: null,
            activityLog: [],
            darkMode: localStorage.getItem('hexo-theme') === 'dark',
            _listeners: [],
            _loaded: { quotes: false, invoices: false, clients: false, packages: false, settings: false },
            notify() { 
                this._listeners.forEach(fn => { try { fn(); } catch(e) {} }); 
            },
            subscribe(fn) { 
                this._listeners.push(fn); 
                return () => { this._listeners = this._listeners.filter(l => l !== fn); };
            }
        };

        // ══════════════════════════════════════════════════════
        // FIREBASE SYNC
        // ══════════════════════════════════════════════════════
        const FirebaseSync = {
            _unsubscribers: [],

            init(userId) {
                this._unsubscribers.forEach(u => { try { u && u(); } catch(e) {} });
                this._unsubscribers = [];
                
                const track = (fn) => { this._unsubscribers.push(fn); };
                const base = () => db.collection('users').doc(userId);

                track(base().collection('quotes').onSnapshot(snap => {
                    State.quotes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    State._loaded.quotes = true;
                    this.cacheData(userId, 'quotes', State.quotes);
                    State.notify();
                }, () => {}));

                track(base().collection('invoices').onSnapshot(snap => {
                    State.invoices = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    State._loaded.invoices = true;
                    this.cacheData(userId, 'invoices', State.invoices);
                    State.notify();
                }, () => {}));

                track(base().collection('clients').onSnapshot(snap => {
                    State.clients = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    State._loaded.clients = true;
                    this.cacheData(userId, 'clients', State.clients);
                    State.notify();
                }, () => {}));

                track(base().collection('packages').onSnapshot(snap => {
                    State.packages = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    State._loaded.packages = true;
                    this.cacheData(userId, 'packages', State.packages);
                    State.notify();
                }, () => {}));

                track(base().collection('settings').doc('preferences').onSnapshot(doc => {
                    if (doc.exists) {
                        State.settings = doc.data();
                    } else {
                        const defaults = {
                            company: { name: 'Hexo Creative', email: 'hexocreative@gmail.com', currency: 'LKR', currencySymbol: 'Rs.', phone: '+94 72 621 54 34', address: 'Minuwangoda, Sri Lanka' },
                            quotes: { prefix: 'HX-QT' },
                            invoices: { prefix: 'HX' },
                            appearance: { logo: null },
                            profit: { defaultRatio: '65/35', partnerALabel: 'You', partnerBLabel: 'Partner' }
                        };
                        base().collection('settings').doc('preferences').set(defaults);
                        State.settings = defaults;
                    }
                    State._loaded.settings = true;
                    this.cacheData(userId, 'settings', State.settings);
                    State.notify();
                }));

                track(base().collection('activityLog').orderBy('timestamp', 'desc').limit(100)
                    .onSnapshot(snap => {
                        State.activityLog = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    }, () => {}));
            },

            cacheData(userId, key, data) {
                try {
                    const cacheKey = 'hexo-cache-' + userId;
                    const cache = JSON.parse(localStorage.getItem(cacheKey) || '{}');
                    cache[key] = data;
                    localStorage.setItem(cacheKey, JSON.stringify(cache));
                } catch(e) {}
            },

            async saveDocument(userId, collection, doc) {
                try {
                    await db.collection('users').doc(userId).collection(collection).doc(doc.id).set(doc);
                    showToast('Saved', 'success');
                    return true;
                } catch (e) { showToast('Error: ' + e.message, 'error'); return false; }
            },

            async deleteDocument(userId, collection, docId) {
                try {
                    await db.collection('users').doc(userId).collection(collection).doc(docId).delete();
                    showToast('Deleted', 'info');
                    return true;
                } catch (e) { showToast('Error: ' + e.message, 'error'); return false; }
            }
        };

                    updateLogoForTheme();
                });
            },
            async signIn(email, password) {
                try {
                    showAuthLoading(true);
                    clearAuthError();
                    await auth.signInWithEmailAndPassword(email, password);
                } catch (e) { showAuthError(friendlyAuthError(e.code)); } 
                finally { showAuthLoading(false); }
            },
            async signUp(email, password) {
                if (password.length < 6) { showAuthError('Password must be at least 6 characters'); return; }
                try {
                    showAuthLoading(true);
                    clearAuthError();
                    await auth.createUserWithEmailAndPassword(email, password);
                } catch (e) { showAuthError(friendlyAuthError(e.code)); } 
                finally { showAuthLoading(false); }
            },
            async forgotPassword(email) {
                if (!email) { showAuthError('Enter your email first'); return; }
                try { await auth.sendPasswordResetEmail(email); showToast('Reset email sent!', 'success'); }
                catch(e) { showAuthError(friendlyAuthError(e.code)); }
            },
            signOut() { auth.signOut(); }
        };

        function friendlyAuthError(code) {
            const map = { 'auth/user-not-found': 'No account found.', 'auth/wrong-password': 'Incorrect password.', 'auth/email-already-in-use': 'Email already in use.', 'auth/invalid-email': 'Invalid email.', 'auth/weak-password': 'Password too short.' };
            return map[code] || 'Authentication failed.';
        }
        function showAuthError(msg) { const el = document.getElementById('auth-error'); if(el) { el.textContent = msg; el.classList.remove('hidden'); } }
        function clearAuthError() { const el = document.getElementById('auth-error'); if(el) el.classList.add('hidden'); }
        function showAuthLoading(show) {
            const form = document.getElementById('signin-form');
            const loading = document.getElementById('auth-loading');
            if (form) form.classList.toggle('hidden', show);
            if (loading) loading.classList.toggle('hidden', !show);
        }

        // ══════════════════════════════════════════════════════
        // PDF GENERATOR - NO PROFIT SPLIT INCLUDED
        // ══════════════════════════════════════════════════════
        const PDFGenerator = {
            async generateDocument(doc, type) {
                try {
                    const { jsPDF } = window.jspdf;
                    const pdf = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4', compress:true });
                    const S = State.settings || {};
                    const PW=pdf.internal.pageSize.getWidth(), PH=pdf.internal.pageSize.getHeight();
                    const ML=16, MR=16, CW=PW-ML-MR;
                    const C = { purple:[64,12,183], ink:[18,24,40], body:[50,60,80], mid:[105,115,135], muted:[155,165,180], strip:[247,248,250], border:[220,224,232], red:[110,110,110], white:[255,255,255], purpled:[64,12,183] };
                    const fill=(c)=>pdf.setFillColor(...c), draw=(c)=>pdf.setDrawColor(...c), color=(c)=>pdf.setTextColor(...c);
                    const font=(s,z)=>{pdf.setFont('helvetica',s);if(z)pdf.setFontSize(z);};
                    const lw=(w)=>pdf.setLineWidth(w), ln=(x1,y1,x2,y2)=>pdf.line(x1,y1,x2,y2);
                    const box=(x,y,w,h,r,m)=>r?pdf.roundedRect(x,y,w,h,r,r,m||'F'):pdf.rect(x,y,w,h,m||'F');
                    const t=(s,x,y,o)=>pdf.text(String(s??''),x,y,o||{});
                    const fmtD=(d)=>{try{return new Date(d).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});}catch{return String(d||'');}};
                    const fmtA=(n)=>`Rs. ${Number(n||0).toFixed(2)}`;

                    let y=14;
                    // Header
                    font('bold',22);color(C.purple);t(S?.company?.name||'HEXO CREATIVE',ML,y+8);
                    font('bold',26);color(C.purple);t(type==='quote'?'QUOTATION':'INVOICE',PW-MR,y+10,{align:'right'});
                    y+=18;
                    draw(C.purple);lw(0.6);ln(ML,y,PW-MR,y);y+=6;
                    font('normal',7.5);color(C.mid);
                    const contact=[S?.company?.address||'Minuwangoda, Sri Lanka','Tel: '+(S?.company?.phone||'+94 72 621 54 34'),'Email: '+(S?.company?.email||'hexocreative@gmail.com')].join('   |   ');
                    t(contact,ML,y);y+=10;

                    // Meta info
                    const META_H=16;fill(C.strip);draw(C.border);lw(0.15);box(ML,y,CW,META_H,2,'FD');
                    const meta=[
                        {label:type==='quote'?'Quotation No.':'Invoice No.',val:doc.number||'—'},
                        {label:'Issue Date',val:fmtD(doc.date)},
                        {label:'Due Date',val:fmtD(doc.dueDate)}
                    ];
                    meta.forEach(({label,val},i)=>{
                        const cx=ML+5+i*(CW/3);
                        font('normal',6.5);color(C.mid);t(label.toUpperCase(),cx,y+5.5);
                        font('bold',9.5);color(C.ink);t(val,cx,y+13);
                    });
                    y+=META_H+11;

                    // Bill to
                    font('bold',12);color(C.purple);t('BILL TO',ML,y);y+=7;
                    font('bold',11.5);color(C.ink);t(doc.clientName||'Client',ML,y);y+=5.5;
                    font('normal',8.5);color(C.mid);
                    const client=State.clients?.find(c=>c.id===doc.clientId);
                    if(client?.companyName){t(client.companyName,ML,y);y+=5;}
                    if(client?.email){t(client.email,ML,y);y+=5;}
                    y+=8;

                    // Items table
                    const tableRows=(doc.items||[]).map(item=>[
                        item.description||'',
                        String(item.qty??0),
                        fmtA(item.price||0),
                        fmtA((item.qty||0)*(item.price||0))
                    ]);
                    pdf.autoTable({
                        startY:y,
                        head:[['Description','Qty','Unit Price (LKR)','Total (LKR)']],
                        body:tableRows,
                        theme:'plain',
                        headStyles:{fillColor:C.purpled,textColor:C.white,fontStyle:'bold',fontSize:8.5,cellPadding:{top:6,bottom:6,left:6,right:6}},
                        styles:{fontSize:9,cellPadding:{top:6,bottom:6,left:6,right:6},textColor:C.body,lineColor:C.border,lineWidth:0.15},
                        alternateRowStyles:{fillColor:C.strip},
                        bodyStyles:{fillColor:C.white},
                        margin:{left:ML,right:MR}
                    });

                    // Totals
                    const subtotal=(doc.items||[]).reduce((s,i)=>s+(i.qty||0)*(i.price||0),0);
                    const discount=doc.discount||0, advance=doc.advance||0, total=Math.max(0,subtotal-discount-advance);
                    let ty=pdf.lastAutoTable.finalY+7;
                    const TBW=80, TX=PW-MR-TBW;
                    const xRows=(discount>0?1:0)+(advance>0?1:0);
                    const TBH=13+xRows*9+16;
                    
                    fill(C.strip);draw(C.border);lw(0.15);box(TX,ty,TBW,TBH,2,'FD');
                    const LX=TX+6, VX=PW-MR-4;
                    let ry=ty+10;
                    
                    font('normal',8.5);color(C.mid);t('Subtotal',LX,ry);
                    font('bold',8.5);color(C.body);t(fmtA(subtotal),VX,ry,{align:'right'});
                    ry+=9;
                    
                    if(discount>0){
                        font('normal',8.5);color(C.mid);t('Discount',LX,ry);
                        font('bold',8.5);color(C.red);t('- '+fmtA(discount),VX,ry,{align:'right'});
                        ry+=9;
                    }
                    if(advance>0){
                        font('normal',8.5);color(C.mid);t('Advance Paid',LX,ry);
                        font('bold',8.5);color(C.red);t('- '+fmtA(advance),VX,ry,{align:'right'});
                        ry+=9;
                    }
                    
                    draw(C.border);lw(0.2);ln(LX,ry-3,VX,ry-3);
                    ry+=6;
                    font('bold',10);color(C.ink);t('TOTAL DUE',LX,ry);
                    font('bold',13);color(C.purple);t(fmtA(total),VX,ry,{align:'right'});

                    // NO PROFIT SPLIT IN PDF - REMOVED

                    // Paid watermark
                    if(doc.status==='Paid'){
                        pdf.saveGraphicsState();
                        pdf.setGState(new pdf.GState({opacity:0.06}));
                        font('bold',72);
                        color([16,185,129]);
                        pdf.text('PAID',PW/2,PH/2,{align:'center',angle:35});
                        pdf.restoreGraphicsState();
                    }

                    // Terms
                    const terms=['All fees are in Sri Lankan Rupees (LKR) and are payable within 30 days.','Payment via direct bank transfer only. Bank details provided upon request.','Work commences only after receipt of agreed advance payment.','Client responsible for providing timely access, approvals, and feedback.','Upon full payment, client owns final deliverables. Hexo Creative retains rights to underlying tools and methodologies.','Services may be suspended for non-payment. Either party may terminate with 30 days\' written notice.','Total liability limited to fees paid in the preceding 3 months.'];
                    let termsY=ty+TBH+11;
                    draw(C.border);lw(0.2);ln(ML,termsY,PW-MR,termsY);termsY+=6;
                    font('bold',7.5);color(C.mid);t('TERMS & CONDITIONS',ML,termsY);termsY+=6;
                    terms.forEach((term,i)=>{
                        const lines=pdf.splitTextToSize(term,CW-8);
                        const blockH=lines.length*4+2.5;
                        font('bold',7.5);color(C.purple);t(`${i+1}.`,ML,termsY);
                        font('normal',7.5);color(C.mid);
                        lines.forEach((l,li)=>t(l,ML+7,termsY+li*4));
                        termsY+=blockH;
                    });

                    // Footer
                    const FY=PH-10;
                    draw(C.border);lw(0.2);ln(ML,FY-4,PW-MR,FY-4);
                    font('normal',7.5);color(C.muted);
                    t('Thank you for your business!',PW/2,FY,{align:'center'});
                    
                    pdf.save(`${type}-${doc.number||'draft'}.pdf`);
                } catch(err) { 
                    console.error(err); 
                    showToast('PDF error: '+err.message,'error'); 
                }
            }
        };

        // ══════════════════════════════════════════════════════
        // FIXED PROFIT SHARE LOGIC
        // ══════════════════════════════════════════════════════
        function parseProfitRatio(ratioStr) {
            // "65/35" means you get 65, partner gets 35
            const parts = (ratioStr||'65/35').split('/');
            let you = parseInt(parts[0]) || 65;
            let partner = parseInt(parts[1]) || 35;
            
            // Ensure you always get the larger share
            if (you < partner) {
                [you, partner] = [partner, you];
            }
            
            return { you, partner };
        }

                <div class="card overflow-hidden">

                        <tbody id="list-tbody">
                        ${items.map(d => `

                                <td>${getStatusBadge(d.status)}</td>
                                <td class="text-right">
                                    <div class="flex items-center justify-end gap-1">
                                        <button onclick="event.stopPropagation();UI.navigate('form',{type:'${type}',id:'${d.id}'})" class="action-btn" title="Edit"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
                                        <button onclick="event.stopPropagation();generatePDF('${type}','${d.id}')" class="action-btn" title="PDF"><i data-lucide="file-down" class="w-4 h-4"></i></button>
                                        <button onclick="event.stopPropagation();duplicateDocument('${type}','${d.id}')" class="action-btn" title="Duplicate"><i data-lucide="copy" class="w-4 h-4"></i></button>
                                        <button onclick="event.stopPropagation();deleteDocument('${type}','${d.id}')" class="action-btn" title="Delete"><i data-lucide="trash-2" class="w-4 h-4"></i></button>

                setTimeout(() => {
                    lucide.createIcons();
                    const searchInput = document.getElementById('list-search');
                    const statusFilter = document.getElementById('list-status-filter');
                    const applyFilters = () => {
                        const search = (searchInput?.value || '').toLowerCase();
                        const status = statusFilter?.value || '';
                        document.querySelectorAll('#list-tbody tr').forEach(row => {
                            row.style.display = (!search || row.dataset.number.includes(search) || row.dataset.client.includes(search)) && (!status || row.dataset.status === status) ? '' : 'none';
                        });
                    };
                    searchInput?.addEventListener('input', applyFilters);
                    statusFilter?.addEventListener('change', applyFilters);
                }, 100);
            }

            // ── FORM WITH PROPER PROFIT SPLIT ──────────────────────────
            function renderForm(type, id=null) {
                const collection = type==='quotes' ? State.quotes : State.invoices;
                const settings = State.settings || { company:{ currencySymbol:'Rs.' }, profit:{ defaultRatio:'65/35', partnerALabel:'You', partnerBLabel:'Partner' } };
                const clients  = State.clients  || [];
                const packages = State.packages || [];
                const isInvoice = type === 'invoices';
                const defaultProfit = settings.profit || { defaultRatio:'65/35', partnerALabel:'You', partnerBLabel:'Partner' };

                let doc = id ? collection.find(d=>d.id===id) : {
                    id: crypto.randomUUID(), number: generateNumber(type), clientId:'', clientName:'',
                    items:[{id:crypto.randomUUID(),description:'',qty:1,price:0}],
                    status:'Draft', date:new Date().toISOString().split('T')[0],
                    dueDate:new Date(Date.now()+30*86400000).toISOString().split('T')[0],
                    discount:0, advance:0, notes:'', total:0,
                    profitShare: parseProfitRatio(defaultProfit.defaultRatio||'65/35')
                };
                if (!doc) { container.innerHTML = `<p style="color:var(--text-muted);text-align:center;padding:3rem;">Document not found.</p>`; return; }

                const sym = settings.company?.currencySymbol || 'Rs.';
                
                // Ensure profit share is properly set
                let currentProfitShare = doc.profitShare || parseProfitRatio(defaultProfit.defaultRatio || '65/35');
                // Make sure you always get the larger share
                if (currentProfitShare.you < currentProfitShare.partner) {
                    [currentProfitShare.you, currentProfitShare.partner] = [currentProfitShare.partner, currentProfitShare.you];
                }
                const currentRatio = `${currentProfitShare.you}/${currentProfitShare.partner}`;

                container.innerHTML = `
                <div class="flex items-center gap-3 mb-6">
                    <button onclick="UI.navigate('${type}')" class="action-btn p-2 rounded-xl" style="border:1px solid var(--border)"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>
                    <div>
                        <h1 class="text-xl sm:text-2xl font-bold" style="color:var(--text)">${id?'Edit':'New'} ${type==='quotes'?'Quotation':'Invoice'}</h1>
                        <span class="mono text-sm" style="color:var(--text-muted)">#${doc.number}</span>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-12 gap-4 sm:gap-6">
                    <div class="lg:col-span-7 space-y-4">
                        <div class="card p-4 sm:p-5 space-y-4">
                            <div>
                                <label class="form-label">Client</label>
                                <select id="form-client" class="input-field">
                                    <option value="">Select a client…</option>
                                    ${clients.map(c=>`<option value="${c.id}" data-name="${c.contactName}" data-email="${c.email||''}" ${doc.clientId===c.id?'selected':''}>${c.contactName}${c.companyName?` (${c.companyName})`:''}</option>`).join('')}
                                </select>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div><label class="form-label">Issue Date</label><input type="date" id="form-date" class="input-field" value="${doc.date}"></div>
                                <div><label class="form-label">Due Date</label><input type="date" id="form-due-date" class="input-field" value="${doc.dueDate}"></div>
                            </div>
                            <div><label class="form-label">Status</label><select id="form-status" class="input-field">${isInvoice?['Draft','Sent','Paid','Overdue'].map(s=>`<option ${doc.status===s?'selected':''}>${s}</option>`).join(''):['Draft','Sent','Accepted','Rejected'].map(s=>`<option ${doc.status===s?'selected':''}>${s}</option>`).join('')}</select></div>
                        </div>

                        <div class="card p-4 sm:p-5">
                            <div class="flex flex-wrap justify-between items-center gap-3 mb-4">
                                <label class="form-label mb-0">Line Items</label>
                                <div class="flex flex-wrap gap-2">
                                    <select id="package-selector" class="input-field text-sm py-1.5 w-auto"><option value="">Add package…</option>${packages.map(p=>`<option value="${p.id}" data-price="${p.price}" data-name="${p.name}">${p.name} — ${sym}${p.price}</option>`).join('')}</select>
                                    <button id="add-package-btn" class="btn-secondary py-1.5 text-sm">Add</button>
                                    <button id="add-item-btn" class="btn-primary py-1.5 text-sm flex items-center gap-1"><i data-lucide="plus" class="w-3 h-3"></i> Custom</button>
                                </div>
                            </div>
                            <div id="items-container" class="space-y-2"></div>
                        </div>

                        <div class="card p-4 sm:p-5">
                            <h4 class="font-semibold mb-3 text-sm" style="color:var(--text)">Adjustments</h4>
                            <div class="grid grid-cols-2 gap-4">
                                <div><label class="form-label">Discount (${sym})</label><input type="number" id="form-discount" class="input-field" value="${doc.discount||0}" min="0" step="100"></div>
                                <div><label class="form-label">Advance (${sym})</label><input type="number" id="form-advance" class="input-field" value="${doc.advance||0}" min="0" step="100"></div>
                            </div>
                        </div>

                        ${isInvoice ? `
                        <!-- PROFIT SPLIT - Internal only, NOT shown on PDF -->
                        <div class="card p-4 sm:p-5">
                            <div class="flex items-center justify-between mb-3">
                                <h4 class="font-semibold text-sm" style="color:var(--text)">Profit Split (Internal Only)</h4>
                                <span class="text-xs px-2 py-1 rounded-full" style="background:var(--purple-soft);color:var(--purple-text)">Not shown on invoice</span>
                            </div>
                            <p class="text-xs mb-4" style="color:var(--text-muted)">This is for your records only. The larger percentage is always your share.</p>
                            <div class="flex flex-wrap gap-2 mb-4">
                                <button class="profit-ratio-btn ${currentRatio==='65/35'?'selected':''}" data-ratio="65/35">65/35 (You/Partner)</button>
                                <button class="profit-ratio-btn ${currentRatio==='60/40'?'selected':''}" data-ratio="60/40">60/40 (You/Partner)</button>
                            </div>
                            <div class="grid grid-cols-2 gap-4 p-4 rounded-xl" style="background:var(--surface-2)">
                                <div>
                                    <div class="text-xs font-medium mb-1" style="color:var(--text-muted)">${defaultProfit.partnerALabel||'You'} (${currentProfitShare.you}%)</div>
                                    <div class="text-lg font-bold mono" style="color:#10b981" id="profit-you">—</div>
                                </div>
                                <div>
                                    <div class="text-xs font-medium mb-1" style="color:var(--text-muted)">${defaultProfit.partnerBLabel||'Partner'} (${currentProfitShare.partner}%)</div>
                                    <div class="text-lg font-bold mono" style="color:var(--purple-text)" id="profit-partner">—</div>
                                </div>
                            </div>
                        </div>` : ''}

                        <div class="card p-4 sm:p-5">
                            <label class="form-label">Notes</label>
                            <textarea id="form-notes" class="input-field" rows="2" placeholder="Additional notes…">${doc.notes||''}</textarea>
                        </div>

                        <div class="flex flex-wrap gap-2 justify-end pb-8">
                            <button onclick="UI.navigate('${type}')" class="btn-secondary py-2.5 text-sm">Cancel</button>
                            <button onclick="saveAndGeneratePDF('${type}','${doc.id}')" class="btn-secondary py-2.5 text-sm" style="color:var(--purple-text);border-color:var(--purple-mid)">Save & PDF</button>
                            <button id="save-doc-btn" class="btn-primary py-2.5 px-6 text-sm">Save</button>
                        </div>
                    </div>

                    <div class="lg:col-span-5">
                        <div class="preview-pane p-6 sm:p-8 mb-6 lg:mb-0">
                            <div class="flex justify-between items-start mb-6 sm:mb-10">
                                <div><div class="text-lg sm:text-xl font-bold" style="color:var(--text)">${settings.company?.name||'Hexo Creative'}</div></div>
                                <div class="text-right"><div class="font-bold mono text-sm" style="color:var(--text)">#${doc.number}</div></div>
                            </div>
                            <div class="mb-6 sm:mb-8"><div class="text-lg sm:text-xl font-bold" style="color:var(--text)" id="preview-client">${doc.clientName||'—'}</div></div>
                            <table class="w-full mb-6 sm:mb-8">
                                <thead style="border-bottom:2px solid var(--border)"><tr class="text-left text-xs uppercase font-bold" style="color:var(--text-muted)"><th class="py-3">Item</th><th class="py-3 text-right">Total</th></tr></thead>
                                <tbody id="preview-items"></tbody>
                            </table>
                            <div class="flex justify-end pt-5 border-t" style="border-color:var(--border)"><div class="text-right"><div class="text-3xl sm:text-4xl font-black mono" style="color:var(--purple-text)" id="preview-total-large">0.00</div></div></div>
                        </div>
                    </div>
                </div>`;

                document.querySelectorAll('.form-label').forEach(el => {
                    el.style.cssText = 'display:block;font-size:0.72rem;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);margin-bottom:5px';
                });

                let items = doc.items?.map(it=>({...it,id:it.id||crypto.randomUUID()})) || [];
                
                function renderItems() {
                    const c = document.getElementById('items-container');
                    if (!c) return;
                    c.innerHTML = items.map(it => `
                    <div class="flex gap-2 items-center" data-id="${it.id}">
                        <div class="flex-1"><input type="text" placeholder="Description" class="input-field item-desc text-sm" value="${it.description||''}"></div>
                        <div class="w-14 sm:w-16"><input type="number" placeholder="Qty" class="input-field item-qty text-sm text-center" value="${it.qty||1}" min="1"></div>
                        <div class="w-24 sm:w-28"><input type="number" placeholder="Price" class="input-field item-price text-sm" value="${it.price||0}" min="0" step="100"></div>
                        <button class="action-btn remove-item shrink-0"><i data-lucide="x" class="w-4 h-4"></i></button>
                    </div>`).join('');
                    lucide.createIcons();
                    document.querySelectorAll('.item-desc,.item-qty,.item-price').forEach(el => el.addEventListener('input', updatePreview));
                    document.querySelectorAll('.remove-item').forEach(btn => btn.addEventListener('click', function() {
                        items = items.filter(i => i.id !== this.closest('[data-id]').dataset.id);
                        renderItems();
                    }));
                    updatePreview();
                }

                function updatePreview() {
                    document.querySelectorAll('#items-container [data-id]').forEach(row => {
                        const id = row.dataset.id;
                        const item = items.find(i => i.id === id);
                        if (item) {
                            item.description = row.querySelector('.item-desc')?.value || '';
                            item.qty = parseFloat(row.querySelector('.item-qty')?.value) || 0;
                            item.price = parseFloat(row.querySelector('.item-price')?.value) || 0;
                        }
                    });

                    const subtotal = items.reduce((s,i) => s+(i.qty*i.price), 0);
                    const discount = Math.min(parseFloat(document.getElementById('form-discount')?.value)||0, subtotal);
                    const advance = Math.min(parseFloat(document.getElementById('form-advance')?.value)||0, subtotal-discount);
                    const total = Math.max(0, subtotal - discount - advance);
                    const fmt = n => sym + ' ' + new Intl.NumberFormat('en-US',{minimumFractionDigits:2}).format(n);

                    document.getElementById('preview-total-large').textContent = fmt(total);
                    document.getElementById('preview-items').innerHTML = items.map(i => `
                    <tr style="border-top:1px solid var(--border)">
                        <td style="padding:10px 0;color:var(--text-mid);font-size:0.85rem">${i.description||'…'} ×${i.qty}</td>
                        <td style="padding:10px 0;text-align:right;font-weight:600;font-family:'DM Mono',monospace;font-size:0.85rem;color:var(--text)">${fmt(i.qty*i.price)}</td>
                    </tr>`).join('');

                    const sel = document.getElementById('form-client');
                    document.getElementById('preview-client').textContent = sel?.selectedOptions[0]?.dataset?.name || '—';

                    // Update profit preview (internal only)
                    if (isInvoice) {
                        const netP = subtotal - discount;
                        document.getElementById('profit-you').textContent = fmt(netP * (currentProfitShare.you/100));
                        document.getElementById('profit-partner').textContent = fmt(netP * (currentProfitShare.partner/100));
                    }
                }

                // Profit ratio button handlers
                if (isInvoice) {
                    document.querySelectorAll('.profit-ratio-btn').forEach(btn => {
                        btn.addEventListener('click', () => {
                            document.querySelectorAll('.profit-ratio-btn').forEach(b => b.classList.remove('selected'));
                            btn.classList.add('selected');
                            currentProfitShare = parseProfitRatio(btn.dataset.ratio);
                            updatePreview();
                        });
                    });
                }

                document.getElementById('add-item-btn')?.addEventListener('click', () => {
                    items.push({id:crypto.randomUUID(),description:'',qty:1,price:0});
                    renderItems();
                });
                document.getElementById('add-package-btn')?.addEventListener('click', () => {
                    const sel = document.getElementById('package-selector');
                    const opt = sel?.selectedOptions[0];
                    if (opt?.value) {
                        items.push({id:crypto.randomUUID(),description:opt.dataset.name,qty:1,price:parseFloat(opt.dataset.price)||0});
                        renderItems();
                        sel.selectedIndex=0;
                    }
                });
                document.getElementById('form-client')?.addEventListener('change', updatePreview);
                document.getElementById('form-discount')?.addEventListener('input', updatePreview);
                document.getElementById('form-advance')?.addEventListener('input', updatePreview);

                document.getElementById('save-doc-btn')?.addEventListener('click', async () => {
                    if (!State.user) { showToast('Not signed in','error'); return; }
                    const clientSel = document.getElementById('form-client');
                    const clientId = clientSel?.value;
                    if (!clientId) { showToast('Please select a client','error'); return; }

                    const subtotal = items.reduce((s,i) => s+(i.qty*i.price), 0);
                    const discount = Math.min(parseFloat(document.getElementById('form-discount')?.value)||0, subtotal);
                    const advance = Math.min(parseFloat(document.getElementById('form-advance')?.value)||0, subtotal-discount);
                    const total = Math.max(0, subtotal - discount - advance);

                    let status = document.getElementById('form-status')?.value || 'Draft';
                    if (isInvoice && status !== 'Paid' && status !== 'Draft') {
                        const due = new Date(document.getElementById('form-due-date')?.value);
                        if (due < new Date()) status = 'Overdue';
                    }

                    const docToSave = {
                        id: doc.id, number: doc.number, clientId,
                        clientName: clientSel.selectedOptions[0]?.dataset?.name || '',
                        items: items.map(i=>({description:i.description,qty:i.qty,price:i.price})),
                        status, date: document.getElementById('form-date')?.value || '',
                        dueDate: document.getElementById('form-due-date')?.value || '',
                        discount, advance, notes: document.getElementById('form-notes')?.value || '',
                        total, createdAt: doc.createdAt || new Date().toISOString(), updatedAt: new Date().toISOString(),
                        profitShare: isInvoice ? currentProfitShare : null
                    };

                    const ok = await FirebaseSync.saveDocument(State.user.uid, type, docToSave);
                    if (ok) UI.navigate(type);
                });

                renderItems();
                setTimeout(() => lucide.createIcons(), 100);
            }

            // ── OTHER ROUTES ───────────────────────────────────────────
            function renderClients() {
                const clients = State.clients || [];
                container.innerHTML = `
                <div class="flex justify-between items-center mb-6"><h1 class="text-xl sm:text-2xl font-bold" style="color:var(--text)">Clients</h1><button class="btn-primary flex items-center gap-2 py-2.5 text-sm" onclick="showClientModal()"><i data-lucide="plus" class="w-4 h-4"></i> New</button></div>
                ${!clients.length ? `<div class="empty-state flex flex-col items-center justify-center py-16 sm:py-24 text-center"><div class="w-16 h-16 rounded-full flex items-center justify-center mb-4" style="background:var(--hover-bg)"><i data-lucide="users" class="w-8 h-8" style="color:var(--text-muted)"></i></div><h3 class="text-lg font-semibold mb-2" style="color:var(--text)">No clients yet</h3><button class="btn-primary py-2.5" onclick="showClientModal()">Add Client</button></div>` : `
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">${clients.map(c=>`<div class="card p-4 sm:p-5 card-lift"><div class="flex items-start gap-3 mb-4"><div class="w-12 h-12 rounded-full flex items-center justify-center text-white font-bold text-lg shrink-0" style="background:linear-gradient(135deg,#8B5CF6,#6D28D9)">${c.contactName?.[0]||'?'}</div><div class="flex-1 min-w-0"><h3 class="font-bold truncate" style="color:var(--text)">${c.contactName}</h3><p class="text-sm truncate" style="color:var(--text-muted)">${c.companyName||'—'}</p></div></div><div class="flex gap-2"><button onclick="editClient('${c.id}')" class="btn-secondary flex-1 py-2 text-sm">Edit</button><button onclick="deleteClient('${c.id}')" class="btn-secondary flex-1 py-2 text-sm" style="color:#dc2626;border-color:#fecaca">Delete</button></div></div>`).join('')}</div>`}`;
                setTimeout(() => lucide.createIcons(), 100);
            }

            function renderPackages() {
                const packages = State.packages || [];
                container.innerHTML = `
                <div class="flex justify-between items-center mb-6"><h1 class="text-xl sm:text-2xl font-bold" style="color:var(--text)">Packages</h1><button class="btn-primary flex items-center gap-2 py-2.5 text-sm" onclick="showPackageModal()"><i data-lucide="plus" class="w-4 h-4"></i> New</button></div>
                ${!packages.length ? `<div class="empty-state flex flex-col items-center justify-center py-16 sm:py-24 text-center"><div class="w-16 h-16 rounded-full flex items-center justify-center mb-4" style="background:var(--hover-bg)"><i data-lucide="package" class="w-8 h-8" style="color:var(--text-muted)"></i></div><h3 class="text-lg font-semibold mb-2" style="color:var(--text)">No packages yet</h3><button class="btn-primary py-2.5" onclick="showPackageModal()">Add Package</button></div>` : `
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">${packages.map(p=>`<div class="card p-4 sm:p-5 card-lift" style="border-left:3px solid var(--purple-mid)"><h3 class="font-bold mb-2" style="color:var(--text)">${p.name}</h3><div class="text-2xl font-bold mono mb-1" style="color:var(--purple-text)">Rs. ${(p.price||0).toFixed(2)}</div><div class="flex gap-2 mt-4"><button onclick="editPackage('${p.id}')" class="btn-secondary flex-1 py-2 text-sm">Edit</button><button onclick="deletePackage('${p.id}')" class="btn-secondary flex-1 py-2 text-sm" style="color:#dc2626;border-color:#fecaca">Delete</button></div></div>`).join('')}</div>`}`;
                setTimeout(() => lucide.createIcons(), 100);
            }

            function renderSettings() {
                const settings = State.settings || {};
                container.innerHTML = `<h1 class="text-xl sm:text-2xl font-bold mb-6" style="color:var(--text)">Settings</h1><div class="card p-4 sm:p-5"><p style="color:var(--text-muted)">Settings loaded.</p></div>`;
            }

            function renderProfit() {
                const invoices = State.invoices || [];
                container.innerHTML = `<h1 class="text-xl sm:text-2xl font-bold mb-6" style="color:var(--text)">Profit Tracking</h1><div class="card p-4 sm:p-5"><p style="color:var(--text-muted)">${invoices.length} invoices loaded.</p></div>`;
            }

            function renderActivity() {
                const log = State.activityLog || [];
                container.innerHTML = `<h1 class="text-xl sm:text-2xl font-bold mb-6" style="color:var(--text)">Activity Log</h1><div class="card p-4 sm:p-5"><p style="color:var(--text-muted)">${log.length} activities recorded.</p></div>`;
            }

            return { navigate };
        })();
        window.UI = UI;

        // ══════════════════════════════════════════════════════
        // UTILITIES
        // ══════════════════════════════════════════════════════
        function generateNumber(type) {
            const settings = State.settings || { quotes:{prefix:'HX-QT'}, invoices:{prefix:'HX'} };
            const prefix = type==='quotes' ? (settings.quotes?.prefix||'HX-QT') : (settings.invoices?.prefix||'HX');
            const year = new Date().getFullYear();
            const collection = type==='quotes' ? State.quotes : State.invoices;
            const numbers = collection.filter(d=>d.number?.startsWith(prefix)).map(d=>{const p=d.number.split('-');return parseInt(p[p.length-1])||0;});
            const max = numbers.length ? Math.max(...numbers) : 0;
            return `${prefix}-${year}-${(max+1).toString().padStart(3,'0')}`;
        }

        function showToast(msg, type='success') {
            const area = document.getElementById('toast-area');
            if (!area) return;
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.cssText = `background:${type==='error'?'#dc2626':type==='info'?'#2563eb':'#059669'};pointer-events:auto`;
            toast.textContent = msg;
            area.appendChild(toast);
            setTimeout(() => { toast.style.opacity='0'; toast.style.transition='all 0.2s ease'; setTimeout(()=>toast.remove(),200); }, 3000);
        }

        function toggleDarkMode() {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', isDark ? 'light' : 'dark');
            localStorage.setItem('hexo-theme', isDark ? 'light' : 'dark');
            const btn = document.getElementById('theme-toggle');
            if (btn) btn.classList.toggle('on', !isDark);
            updateLogoForTheme();
        }

        // ══════════════════════════════════════════════════════
        // GLOBAL FUNCTIONS
        // ══════════════════════════════════════════════════════
        window.generatePDF = async (type, id) => {
            const collection = type==='quotes' ? State.quotes : State.invoices;
            const doc = collection.find(d => d.id === id);
            if (doc) await PDFGenerator.generateDocument(doc, type==='quotes'?'quote':'invoice');
        };

        window.saveAndGeneratePDF = async (type, id) => {
            const btn = document.getElementById('save-doc-btn');
            if (btn) btn.click();
            setTimeout(async () => { await window.generatePDF(type, id); }, 1500);
        };

        window.deleteDocument = async (type, id) => {
            if (!State.user || !confirm('Delete this document?')) return;
            await FirebaseSync.deleteDocument(State.user.uid, type, id);
            UI.navigate(type);
        };

        window.duplicateDocument = async (type, id) => {
            if (!State.user) return;
            const collection = type==='quotes' ? State.quotes : State.invoices;
            const orig = collection.find(d => d.id===id);
            if (!orig) return;
            const copy = { ...orig, id:crypto.randomUUID(), number:generateNumber(type), status:'Draft', createdAt:new Date().toISOString(), updatedAt:new Date().toISOString() };
            await FirebaseSync.saveDocument(State.user.uid, type, copy);
        };

        window.showClientModal = (editId=null) => {
            const client = editId ? State.clients.find(c=>c.id===editId) : null;
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 z-50 flex items-center justify-center p-4';
            modal.style.background = 'rgba(0,0,0,0.4)';
            modal.innerHTML = `<div class="card p-6 w-full max-w-md"><h3 class="text-xl font-bold mb-4" style="color:var(--text)">${editId?'Edit':'New'} Client</h3><div class="space-y-4"><div><label class="text-xs font-semibold uppercase block mb-1" style="color:var(--text-muted)">Name</label><input type="text" id="cm-name" value="${client?.contactName||''}" class="input-field"></div><div><label class="text-xs font-semibold uppercase block mb-1" style="color:var(--text-muted)">Email</label><input type="email" id="cm-email" value="${client?.email||''}" class="input-field"></div></div><div class="flex gap-2 mt-5"><button class="btn-secondary flex-1 py-2.5" onclick="this.closest('.fixed').remove()">Cancel</button><button class="btn-primary flex-1 py-2.5" id="cm-save">Save</button></div></div>`;
            document.body.appendChild(modal);
            modal.addEventListener('click', e=>{ if(e.target===modal)modal.remove(); });
            modal.querySelector('#cm-save').addEventListener('click', async ()=>{
                if (!State.user) return;
                const name = modal.querySelector('#cm-name').value.trim();
                if (!name) { showToast('Name required','error'); return; }
                await FirebaseSync.saveDocument(State.user.uid,'clients',{id:editId||crypto.randomUUID(),contactName:name,email:modal.querySelector('#cm-email').value.trim(),companyName:'',phone:'',notes:''});
                modal.remove();
            });
        };

        window.editClient = (id) => showClientModal(id);
        window.deleteClient = async (id) => {
            if (!State.user || !confirm('Delete this client?')) return;
            await FirebaseSync.deleteDocument(State.user.uid,'clients',id);
        };

        window.showPackageModal = (editId=null) => {
            const pkg = editId ? State.packages.find(p=>p.id===editId) : null;
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 z-50 flex items-center justify-center p-4';
            modal.style.background = 'rgba(0,0,0,0.4)';
            modal.innerHTML = `<div class="card p-6 w-full max-w-md"><h3 class="text-xl font-bold mb-4" style="color:var(--text)">${editId?'Edit':'New'} Package</h3><div class="space-y-4"><div><label class="text-xs font-semibold uppercase block mb-1" style="color:var(--text-muted)">Name</label><input type="text" id="pm-name" value="${pkg?.name||''}" class="input-field"></div><div><label class="text-xs font-semibold uppercase block mb-1" style="color:var(--text-muted)">Price (Rs.)</label><input type="number" id="pm-price" value="${pkg?.price||0}" class="input-field" min="0" step="100"></div></div><div class="flex gap-2 mt-5"><button class="btn-secondary flex-1 py-2.5" onclick="this.closest('.fixed').remove()">Cancel</button><button class="btn-primary flex-1 py-2.5" id="pm-save">Save</button></div></div>`;
            document.body.appendChild(modal);
            modal.addEventListener('click', e=>{ if(e.target===modal)modal.remove(); });
            modal.querySelector('#pm-save').addEventListener('click', async ()=>{
                if (!State.user) return;
                const name = modal.querySelector('#pm-name').value.trim();
                if (!name) { showToast('Name required','error'); return; }
                await FirebaseSync.saveDocument(State.user.uid,'packages',{id:editId||crypto.randomUUID(),name,price:parseFloat(modal.querySelector('#pm-price').value)||0,category:'',duration:'',description:''});
                modal.remove();
            });
        };

        window.editPackage = (id) => showPackageModal(id);
        window.deletePackage = async (id) => {
            if (!State.user || !confirm('Delete this package?')) return;
            await FirebaseSync.deleteDocument(State.user.uid,'packages',id);
        };

        // ══════════════════════════════════════════════════════
        // INIT
        // ══════════════════════════════════════════════════════
        document.addEventListener('DOMContentLoaded', () => {
            MobileSidebar.init();

            if (State.darkMode) {
                document.documentElement.setAttribute('data-theme','dark');
                document.getElementById('theme-toggle')?.classList.add('on');
            }
            updateLogoForTheme();

            Auth.init();

            document.getElementById('signin-btn')?.addEventListener('click',()=>{
                const email=document.getElementById('auth-email')?.value;
                const pw=document.getElementById('auth-password')?.value;
                if(!email||!pw){showAuthError('Please enter email and password');return;}
                Auth.signIn(email,pw);
            });
            document.getElementById('auth-password')?.addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('signin-btn')?.click(); });
            document.getElementById('signup-btn')?.addEventListener('click',()=>{
                const email=document.getElementById('auth-email')?.value;
                const pw=document.getElementById('auth-password')?.value;
                if(!email||!pw){showAuthError('Please enter email and password');return;}
                Auth.signUp(email,pw);
            });
            document.getElementById('signout-btn')?.addEventListener('click',()=>Auth.signOut());
            document.getElementById('forgot-pw-btn')?.addEventListener('click',()=>Auth.forgotPassword(document.getElementById('auth-email')?.value));
            document.getElementById('show-auth')?.addEventListener('click',()=>{ document.getElementById('auth-modal').style.display='flex'; });
            document.getElementById('theme-toggle')?.addEventListener('click', toggleDarkMode);
            document.getElementById('auth-modal')?.addEventListener('click',e=>{ if(e.target===e.currentTarget)e.currentTarget.style.display='none'; });

            document.querySelectorAll('[data-route]').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    UI.navigate(link.dataset.route);
                });
            });
        });
    })();
    </script>
</body>
</html>
